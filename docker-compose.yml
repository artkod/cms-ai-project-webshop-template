services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: project_webshop_template
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms_local_password
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d project_webshop_template"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
